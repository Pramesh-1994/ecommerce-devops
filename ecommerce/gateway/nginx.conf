events { worker_connections 1024; }

http {
    upstream user_service    { server user-service:3001; }
    upstream product_service { server product-service:3002; }
    upstream order_service   { server order-service:3003; }
    upstream payment_service { server payment-service:3004; }

    server {
        listen 80;

        # Health check
        location /health {
            return 200 '{"status":"OK","service":"api-gateway"}';
            add_header Content-Type application/json;
        }

        # User Service
        location /api/users {
            proxy_pass http://user_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Product Service
        location /api/products {
            proxy_pass http://product_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Order Service
        location /api/orders {
            proxy_pass http://order_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Payment Service
        location /api/payments {
            proxy_pass http://payment_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
