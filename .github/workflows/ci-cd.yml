name: E-Commerce CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    name: Build & Push All Services
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push User Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/user-service
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ecommerce-user-service:latest

      - name: Build & Push Product Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/product-service
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ecommerce-product-service:latest

      - name: Build & Push Order Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/order-service
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ecommerce-order-service:latest

      - name: Build & Push Payment Service
        uses: docker/build-push-action@v5
        with:
          context: ./services/payment-service
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ecommerce-payment-service:latest

      - name: Build & Push API Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./gateway
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ecommerce-api-gateway:latest

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/ecommerce-frontend:latest

      - name: Pipeline Complete
        run: |
          echo "🚀 All 6 images pushed to Docker Hub!"
          echo "✅ User Service"
          echo "✅ Product Service"
          echo "✅ Order Service"
          echo "✅ Payment Service"
          echo "✅ API Gateway"
          echo "✅ Frontend"
